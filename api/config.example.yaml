# 博客项目配置文件模板
#
# 使用说明：
#   1. 此文件提供默认配置，通常不需要修改
#   2. 敏感配置（密码、API Key）通过环境变量覆盖
#   3. 本地开发：复制 .env.example 为 .env 并修改
#   4. 生产部署：使用 .env.production 配置环境变量
#
# 配置优先级：环境变量 > config.yaml > 此文件的默认值

# ── 运行环境 ────────────────────────────────
environment: development

# ── 服务配置 ────────────────────────────────
port: 8080
frontend_url: http://localhost:5173
upload_path_prefix: /uploads/

# ── 数据库 ──────────────────────────────────
database:
  host: localhost
  port: 5432
  name: blog
  user: blog
  password: ""  # 通过 DATABASE_PASSWORD 环境变量配置
  sslmode: disable  # 生产环境通过 DATABASE_SSLMODE=require 覆盖

# ── Redis ───────────────────────────────────
redis:
  host: localhost
  port: 6379
  db: 0
  password: ""  # 通过 REDIS_PASSWORD 环境变量配置（可选）

# ── JWT ─────────────────────────────────────
jwt_private_key_path: ./jwt_private_key.pem
jwt_public_key_path: ./jwt_public_key.pem
jwt_access_token_ttl: 15m
jwt_refresh_token_ttl: 168h

# ── 邮件服务 (Resend) ────────────────────────
resend_api_key: ""  # 通过 RESEND_API_KEY 环境变量配置
email_from: noreply@yourdomain.com

# ── B站表情种子数据 ──────────────────────────
# 通过环境变量配置：BILIBILI_SESSDATA, BILIBILI_BILI_JCT, BILIBILI_DEDEUSERID
bilibili_sessdata: ""
bilibili_bili_jct: ""
bilibili_dedeuserid: ""

# ── 超级管理员 ────────────────────────────────
superadmin:
  enabled: false
  username: admin
  email: admin@example.com
  password: ""  # 通过 SUPERADMIN_PASSWORD 环境变量配置
